name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 4.0.0
        required: true
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx6g -Xms4g"
      LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Decrypt Stored Credentials
        run: ./libs/spreadsheet-builder-google/tokens/decrypt_secret.sh
      - name: Export signing key
        env:
          SIGNING_SECRET_KEY_BASE64: ${{ secrets.SIGNING_SECRET_KEY_BASE64 }}
        run: |
          {
            echo 'ORG_GRADLE_PROJECT_signingInMemoryKey<<EOF'
            printf '%s' "$SIGNING_SECRET_KEY_BASE64" | base64 --decode
            echo
            echo EOF
          } >> "$GITHUB_ENV"
      - name: Semantic Version
        id: version
        if: github.event_name == 'push'
        uses: ncipollo/semantic-version-action@v1
      - name: Publish
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_TOKEN_USERNAME || secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_TOKEN_PASSWORD || secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew gitPublishPush publishAndReleaseToMavenCentral -Pversion=${{ github.event_name == 'workflow_dispatch' && inputs.version || steps.version.outputs.tag }} -Prelease=true -Dorg.ajoberstar.grgit.auth.username=${{ secrets.GH_PAGES_TOKEN }} --stacktrace
